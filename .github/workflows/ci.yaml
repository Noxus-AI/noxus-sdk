name: CI

on:
  push:
    branches: [main]
    tags:
      - "*" # Push events to matching any tag for publishing
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint check
        run: uvx ruff check .

      - name: Format check
        run: uvx ruff format --check .

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install --system -e "." pytest pytest-asyncio filelock

      - name: Run unit tests
        run: pytest tests/unit/ -x --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets are configured
        id: check-secrets
        run: |
          if [ -z "$NOXUS_API_KEY" ] || [ -z "$NOXUS_BASE_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::NOXUS_API_KEY or NOXUS_BASE_URL not set — skipping integration tests"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NOXUS_API_KEY: ${{ secrets.NOXUS_API_KEY }}
          NOXUS_BASE_URL: ${{ secrets.NOXUS_BASE_URL }}

      - name: Install uv
        if: steps.check-secrets.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        if: steps.check-secrets.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.check-secrets.outputs.skip == 'false'
        run: uv pip install --system -e "." pytest pytest-asyncio pytest-subtests filelock

      - name: Run integration tests
        if: steps.check-secrets.outputs.skip == 'false'
        run: pytest tests/integration/ -x --tb=short
        env:
          NOXUS_API_KEY: ${{ secrets.NOXUS_API_KEY }}
          NOXUS_BASE_URL: ${{ secrets.NOXUS_BASE_URL }}

  build:
    needs: [lint, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatch

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: [build, integration-tests]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/noxus-sdk
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
